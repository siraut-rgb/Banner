                                   ENVIRONMENT: EXECUTION LAYER
                       UNAUTHORIZED ACCESS TO THIS INFRASTRUCTURE IS PROHIBITED
          =================================================================================
          
           [+] Node Name:       {{ ansible_hostname }}
           [+] OS Distribution: {{ ansible_distribution }} {{ ansible_distribution_version }}
           [+] Kernel Version:  {{ ansible_kernel }}
           [+] Total Memory:    {{ (ansible_memtotal_mb / 1024) | round(2) }} GB
           [+] Management IP:   {{ ansible_default_ipv4.address | default('N/A') }}
          
